# Example configuration file for tiddl
# Copy this file to %USERPROFILE%\.tiddl\config.toml or alongside the executable in the 'config' folder

enable_cache = true
debug = false

[metadata]
enable = true
embed_lyrics = false
save_lyrics = false
cover = false
album_review = false

[cover]
save = false
size = 1280
allowed = [] # ["track", "album", "playlist"]

[cover.templates]
track = ""
album = ""
playlist = ""

[download]
track_quality = "high" # "low", "high", "lossless", "hires"
video_quality = "fhd"  # "audio", "360", "480", "720", "1080", "fhd"
skip_existing = true
threads_count = 2            # Descargas concurrentes (1=serial/silencioso, 2=balanceado, 4+=agresivo)
requests_per_minute = 30     # Llamadas API por minuto (30=humano, 50=normal, 80+=agresivo)
track_delay = 2.0            # Pausa máxima aleatoria (seg) entre pistas. Se elige random(0.5, track_delay)
artist_concurrency = 1       # Álbumes en paralelo al bajar un artista (1=serial)
artist_delay = 5.0           # Pausa máxima aleatoria (seg) antes de cada álbum del artista
# download_path = "~/Music/tiddl"
# scan_path = "~/Music/tiddl"
singles_filter = "none" # "none", "only", "include"
videos_filter = "none"  # "none", "only", "allow"
update_mtime = false
rewrite_metadata = false

[m3u]
save = false
allowed = [] # ["album", "playlist", "mix"]

[m3u.templates]
album = ""
playlist = ""
mix = ""

[templates]
default = "{album.artist}/{album.title}/{item.title}"
track = ""
video = ""
album = ""
playlist = ""
mix = ""
artist_separator = " / "  # Separator for multiple artists: " / ", ", ", " & ", "; "
